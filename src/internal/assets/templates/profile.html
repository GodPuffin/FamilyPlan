{{define "content"}}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-md">
  <h2 class="text-2xl font-bold text-gray-800 mb-6">Edit Profile</h2>

  {{if .error}}
  <div
    class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4"
    role="alert"
  >
    <p>{{.error}}</p>
  </div>
  {{end}}

  {{if .success}}
  <div
    class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4"
    role="alert"
  >
    <p>{{.success}}</p>
  </div>
  {{end}}

  <form
    id="profilePageForm"
    hx-post="/profile"
    hx-swap="none"
    _="on htmx:afterRequest window.location.reload() end"
    class="space-y-4"
  >
    <div>
      <label for="name" class="block text-sm font-medium text-gray-700 mb-1"
        >Display Name</label
      >
      <input
        type="text"
        id="name"
        name="name"
        value="{{.name}}"
        placeholder="Enter your display name"
        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
      <p class="text-sm text-gray-500 mt-1">
        Leave blank to use your username.
      </p>
    </div>

    <div class="flex justify-end">
      <button
        type="submit"
        class="bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
      >
        Save Changes
      </button>
    </div>
  </form>
</div>
{{end}}
