{{define "content"}}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md">
  <h2 class="text-2xl font-bold text-center mb-6">Login</h2>

  {{if .success}}
  <div
    class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4"
    role="alert"
  >
    <p>{{.success}}</p>
  </div>
  {{end}}

  {{if .error}}
  <div
    class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4"
    role="alert"
  >
    <p>{{.error}}</p>
  </div>
  {{end}}

  {{if .claim}}
  <div class="bg-blue-50 border border-blue-200 text-blue-900 px-4 py-3 rounded mb-4">
    <p class="font-medium">Membership claim invite detected</p>
    <p class="text-sm mt-1">
      Sign in and we'll transfer the tracked artificial member to your account.
    </p>
  </div>
  {{end}}

  <form action="/login" method="post">
    {{if .claim}}
    <input type="hidden" name="claim" value="{{.claim}}" />
    {{end}}
    <div class="mb-4">
      <label for="username" class="block text-gray-700 text-sm font-bold mb-2"
        >Username</label
      >
      <input
        type="text"
        id="username"
        name="username"
        required
        class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
      />
    </div>

    <div class="mb-6">
      <label for="password" class="block text-gray-700 text-sm font-bold mb-2"
        >Password</label
      >
      <input
        type="password"
        id="password"
        name="password"
        required
        class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
      />
    </div>

    <div class="flex items-center justify-between">
      <button
        type="submit"
        class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
      >
        Sign In
      </button>
      <a
        href="{{if .claim}}/register?claim={{.claim}}{{else}}/register{{end}}"
        class="inline-block align-baseline font-bold text-sm text-blue-500 hover:text-blue-800"
      >
        Register
      </a>
    </div>
  </form>
</div>
{{end}}
